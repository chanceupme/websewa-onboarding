<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — WebSewa</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060612;
  --bg2: #0d0d1f;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text: #f0f0ff;
  --text-dim: #8888aa;
  --text-muted: #555577;
  --neon-blue: #00D4FF;
  --neon-green: #00FF94;
  --neon-red: #FF4466;
  --neon-orange: #FF8C00;
  --neon-purple: #BF00FF;
  --glow-blue: 0 0 20px rgba(0,212,255,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
h1,h2,h3 { font-family: 'Syne', sans-serif; }

.login-wrap {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-box {
  width: 100%; max-width: 380px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 32px;
}
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo-icon {
  width: 52px; height: 52px; border-radius: 14px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: #fff;
  box-shadow: var(--glow-blue);
  margin: 0 auto 12px;
}
.login-logo h2 { font-size: 18px; color: var(--text); }
.login-logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 8px; }
.form-input {
  width: 100%; padding: 13px 16px;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid var(--border);
  border-radius: 10px; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: 15px;
  color: var(--text);
  transition: border-color 0.25s;
}
.form-input:focus { border-color: rgba(0,212,255,0.4); }
.btn-login {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  border: none; border-radius: 10px; cursor: pointer;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: #fff;
  margin-top: 8px; transition: all 0.25s;
}
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,255,0.3); }
.btn-login:disabled { opacity: 0.5; pointer-events: none; }
.err-login { font-size: 13px; color: var(--neon-red); text-align: center; margin-top: 12px; display: none; }

.dashboard { display: none; }
.topbar {
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; color: #fff;
}
.topbar h1 { font-size: 16px; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.btn-logout {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-dim);
  transition: all 0.2s;
}
.btn-logout:hover { border-color: var(--neon-red); color: var(--neon-red); }

.content { padding: 32px; max-width: 1200px; margin: 0 auto; }

.stats-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  margin-bottom: 32px;
}
@media(max-width:768px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }

.stat-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 20px;
}
.stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.stat-value { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; }
.stat-value.blue { color: var(--neon-blue); }
.stat-value.green { color: var(--neon-green); }
.stat-value.orange { color: var(--neon-orange); }
.stat-value.purple { color: var(--neon-purple); }

.table-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.table-header {
  padding: 20px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 12px;
}
.table-header h2 { font-size: 16px; color: var(--text); }
.table-actions { display: flex; gap: 10px; align-items: center; }
.search-input {
  padding: 8px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  color: var(--text); width: 200px;
}
.search-input:focus { border-color: rgba(0,212,255,0.3); }
.btn-refresh {
  padding: 8px 14px;
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 8px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--neon-blue);
  transition: all 0.2s;
}
.btn-refresh:hover { background: rgba(0,212,255,0.15); }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border); }
th {
  padding: 12px 16px;
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.8px;
  text-align: left; white-space: nowrap;
  background: rgba(255,255,255,0.02);
}
td {
  padding: 14px 16px;
  font-size: 13px; color: var(--text-dim);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.td-nama { color: var(--text); font-weight: 500; }
.td-subdomain { color: var(--neon-blue); font-family: monospace; font-size: 12px; }
.td-phone { font-family: monospace; font-size: 12px; }

.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.badge-menunggu { background: rgba(255,140,0,0.15); color: var(--neon-orange); border: 1px solid rgba(255,140,0,0.3); }
.badge-aktif { background: rgba(0,255,148,0.1); color: var(--neon-green); border: 1px solid rgba(0,255,148,0.3); }
.badge-nonaktif { background: rgba(255,68,102,0.1); color: var(--neon-red); border: 1px solid rgba(255,68,102,0.3); }

.template-tag {
  display: inline-block; padding: 3px 8px;
  background: rgba(191,0,255,0.1); color: var(--neon-purple);
  border-radius: 6px; font-size: 11px;
}
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state div { font-size: 40px; margin-bottom: 12px; }
.loading-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
.td-date { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

@media(max-width:768px) {
  .topbar { padding: 12px 16px; }
  .content { padding: 16px; }
  .table-header { padding: 14px 16px; }
  th, td { padding: 10px 12px; }
  .search-input { width: 140px; }
}
</style>
</head>
<body>

<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">W</div>
      <h2>WebSewa Admin</h2>
      <p>Masuk untuk melihat data pendaftar</p>
    </div>
    <div class="form-group">
      <label class="form-label">Password Admin</label>
      <input class="form-input" type="password" id="adminPass" placeholder="••••••••"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">Masuk</button>
    <div class="err-login" id="errLogin">Password salah. Coba lagi.</div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">W</div>
      <h1>WebSewa Admin</h1>
    </div>
    <div class="topbar-right">
      <span style="font-size:13px;color:var(--text-muted)" id="lastUpdate">—</span>
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
    </div>
  </div>

  <div class="content">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Pendaftar</div>
        <div class="stat-value blue" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Menunggu</div>
        <div class="stat-value orange" id="statMenunggu">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Aktif</div>
        <div class="stat-value green" id="statAktif">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Daftar Hari Ini</div>
        <div class="stat-value purple" id="statHariIni">—</div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <h2>Data Pendaftar</h2>
        <div class="table-actions">
          <input class="search-input" type="text" placeholder="Cari nama / email..." oninput="filterTable(this.value)">
          <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="dataTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Nama</th>
              <th>Email</th>
              <th>Nomor WA</th>
              <th>Subdomain</th>
              <th>Template</th>
              <th>Status</th>
              <th>Tanggal Daftar</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="8" class="loading-state">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://api.chanceupme.com';
const templateNames = {
  '1':'Neon Dark','2':'Fresh Green','3':'Bold Red',
  '4':'Royal Purple','5':'Ocean Blue','6':'Golden Hour'
};

let allData = [];
let sessionToken = null;

async function doLogin() {
  const pass = document.getElementById('adminPass').value;
  if (!pass) return;

  const btn = document.getElementById('btnLogin');
  btn.disabled = true;
  btn.textContent = 'Memeriksa...';
  document.getElementById('errLogin').style.display = 'none';

  try {
    const res = await fetch(`${API_URL}/admin/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass })
    });
    const data = await res.json();

    if (data.token) {
      sessionToken = data.token;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    } else {
      document.getElementById('errLogin').style.display = 'block';
      document.getElementById('adminPass').value = '';
    }
  } catch(e) {
    document.getElementById('errLogin').textContent = 'Gagal terhubung ke server.';
    document.getElementById('errLogin').style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Masuk';
}

function doLogout() {
  sessionToken = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('adminPass').value = '';
}

async function loadData() {
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="loading-state">Memuat data...</td></tr>';
  try {
    const res = await fetch(`${API_URL}/admin/pendaftar`, {
      headers: { 'x-admin-token': sessionToken }
    });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    allData = data.pendaftar || [];
    renderTable(allData);
    updateStats(allData);
    document.getElementById('lastUpdate').textContent = 'Update: ' + new Date().toLocaleTimeString('id-ID');
  } catch(e) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="empty-state"><div>⚠️</div>Gagal memuat data. Coba refresh.</td></tr>';
  }
}

function renderTable(data) {
  if (data.length === 0) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" class="empty-state"><div>📭</div>Belum ada pendaftar</td></tr>';
    return;
  }
  document.getElementById('tableBody').innerHTML = data.map(r => `
    <tr>
      <td style="color:var(--text-muted)">${r.id}</td>
      <td class="td-nama">${r.nama}</td>
      <td>${r.email}</td>
      <td class="td-phone">${formatPhone(r.phone)}</td>
      <td class="td-subdomain">${r.subdomain}.tokosaya.id</td>
      <td><span class="template-tag">${templateNames[r.template] || r.template}</span></td>
      <td><span class="badge badge-${r.status}">${r.status}</span></td>
      <td class="td-date">${formatDate(r.dibuat_pada)}</td>
    </tr>
  `).join('');
}

function updateStats(data) {
  const today = new Date().toDateString();
  document.getElementById('statTotal').textContent = data.length;
  document.getElementById('statMenunggu').textContent = data.filter(r => r.status === 'menunggu').length;
  document.getElementById('statAktif').textContent = data.filter(r => r.status === 'aktif').length;
  document.getElementById('statHariIni').textContent = data.filter(r => new Date(r.dibuat_pada).toDateString() === today).length;
}

function filterTable(q) {
  const filtered = allData.filter(r =>
    r.nama.toLowerCase().includes(q.toLowerCase()) ||
    r.email.toLowerCase().includes(q.toLowerCase()) ||
    r.subdomain.toLowerCase().includes(q.toLowerCase())
  );
  renderTable(filtered);
}

function formatPhone(phone) {
  const p = phone.replace('62', '0');
  return p.replace(/(\d{4})(\d{4})(\d+)/, '$1-$2-$3');
}

function formatDate(d) {
  return new Date(d).toLocaleString('id-ID', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}
</script>
</body>
</html>
